<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!--
    Simple silhouette placeholder for Ballzatram floating and playing guitar.
    Replace this file with your actual artwork when ready.  The figure is
    composed of basic shapes to provide a visual anchor during development.
  -->
  <style>
    .shape { fill: #ffffff; }
  </style>
  <!-- Head -->
  <circle cx="90" cy="50" r="15" class="shape" />
  <!-- Body -->
  <rect x="82" y="65" width="16" height="40" class="shape" />
  <!-- Right leg -->
  <rect x="75" y="105" width="8" height="40" transform="rotate(20 75 105)" class="shape" />
  <!-- Left leg -->
  <rect x="96" y="105" width="8" height="40" transform="rotate(-15 96 105)" class="shape" />
  <!-- Guitar body -->
  <ellipse cx="135" cy="80" rx="18" ry="12" class="shape" />
  <!-- Guitar neck -->
  <rect x="150" y="75" width="40" height="6" class="shape" />
  <!-- Arm holding guitar -->
  <rect x="95" y="78" width="25" height="6" transform="rotate(20 95 78)" class="shape" />
</svg>