<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parcel Intelligence</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar"><div><p class="kicker">Parcel Intelligence</p><h1>Acquisition Command</h1></div><a href="../../index.html" class="back-link">Back</a></header>

    <section class="stage stage-active" id="stage-chat">
      <h2>AI Intake Chat</h2>
      <div id="chat-log" class="chat-log"></div>
      <form id="chat-form" class="chat-input-row">
        <input id="chat-input" placeholder="Type your answer..." autocomplete="off" />
        <button class="cta" type="submit">Send</button>
      </form>
      <p class="hint">Prompt flow: development goal → min acres → max budget → zoning → max drive minutes.</p>
    </section>

    <section class="stage" id="stage-processing"><div class="spinner"></div><h2>Compiling Data Intelligence</h2><p id="processing-text">Initializing research workflow...</p></section>

    <section class="stage" id="stage-dashboard">
      <div class="dash-head"><h2>Investor Dashboard</h2><p id="summary"></p></div>
      <div class="metrics" id="metrics"></div>
      <div class="table-wrap"><table><thead><tr><th>Property</th><th>Location</th><th>Acres</th><th>Price</th><th>Price/Acre</th><th>Score</th><th>Map</th></tr></thead><tbody id="results"></tbody></table></div>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
