<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parcel Intelligence Dashboard</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app shell">
    <header class="topbar card">
      <div>
        <p class="kicker">Parcel Intelligence</p>
        <h1>Current Opportunities</h1>
        <p class="sub">Production search flow: parameters → search → AI synthesis → investor-ready dashboard.</p>
      </div>
      <a href="../../index.html" class="back-link">Back</a>
    </header>

    <section class="stage stage-active card" id="stage-intake">
      <h2>1) Parameter settings</h2>
      <form id="search-form" class="search-grid">
        <label>Target location
          <input id="location" placeholder="City, county, state, or region" required />
        </label>
        <label>Acquisition thesis
          <select id="goal">
            <option>Equestrian / Polo</option>
            <option>Farm / Ranch</option>
            <option>Land Investment</option>
            <option>Mixed-Use Development</option>
          </select>
        </label>
        <label>Minimum acres<input id="min-acres" type="number" value="20" min="0" /></label>
        <label>Maximum budget (USD)<input id="max-price" type="number" value="5000000" min="0" /></label>
        <label>Max drive time from CBD (minutes)<input id="max-drive" type="number" value="60" min="5" /></label>
        <label>Required utilities
          <select id="utilities"><option value="Any">Any</option><option>Power</option><option>Water</option><option>Sewer</option><option>Power + Water</option></select>
        </label>
        <label>Search coverage
          <select id="source">
            <option value="all">All tracked land marketplaces</option>
            <option value="landsearch">LandSearch</option>
            <option value="land">Land.com</option>
            <option value="loopnet">LoopNet</option>
            <option value="zillow">Zillow</option>
            <option value="realtor">Realtor</option>
          </select>
        </label>
        <button class="cta" type="submit">Run comprehensive search</button>
      </form>
    </section>

    <section class="stage card" id="stage-processing">
      <div class="spinner"></div>
      <h2>2) Search + AI aggregation in progress</h2>
      <p id="processing-text">Building multi-site queries...</p>
    </section>

    <section class="stage card" id="stage-results">
      <div class="dash-head">
        <h2>3) Dashboard results</h2>
        <button id="refresh-btn" class="ghost">Refresh data</button>
      </div>
      <p id="summary"></p>
      <div class="metrics" id="metrics"></div>
      <article class="ai-note" id="ai-note"></article>
      <div class="table-wrap"><table><thead><tr><th>Property</th><th>Source</th><th>Fit</th><th>Rationale</th><th>Link</th></tr></thead><tbody id="results"></tbody></table></div>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
