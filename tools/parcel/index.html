        font-family: Impact, system-ui, sans-serif;

      }

      p {
        font-weight: 900;
        line-height: 1.45;
      }

      a {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.75rem 1rem;
        border: 3px solid #3b1603;
        border-radius: 999px;
        color: #ffecc6;
        background: #743310;
        font-weight: 900;
        text-decoration: none;
        text-transform: uppercase;
