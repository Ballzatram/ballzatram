<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Penitent 2 — Crusades</title>

  <link rel="preload" as="image" href="assets/parchment.png" />
  <link rel="preload" as="image" href="assets/floral_border.png" />
  <link rel="preload" as="image" href="assets/crusader_battle.png" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* Inset grid so nothing tucks under the floral margins */
    .inner{
      position:absolute;
      top:    calc(var(--page-gutter) + 14px);
      bottom: calc(var(--page-gutter) + 14px);
      left:   calc(var(--margin-col) + var(--page-gutter));
      right:  calc(var(--margin-col) + var(--page-gutter));
      display:grid;
      grid-template-columns: 1fr 1fr;  /* left | right page */
      grid-template-rows: auto 1fr;
      gap: clamp(18px, 2.6vw, 28px);
    }

    /* Home – top-left of the left page */
    .home-btn{
      grid-column:1; grid-row:1;
      place-self:start start;
      display:inline-block; text-decoration:none;
      padding:.6rem .9rem; border-radius:10px; border:0;
      background:rgba(0,0,0,.08); color:var(--ink); font-weight:700;
      box-shadow:0 2px 8px rgba(0,0,0,.15);
      transition: transform .12s ease;
    }
    .home-btn:hover{ transform: translateY(-1px); }

    /* Left page: centered illustration plate with optical left nudge */
    .hero-pane{
      --plate-nudge-x: -3.5%;
      position:relative;
      grid-column:1; grid-row:2;
      justify-self:center;      /* center horizontally in left page */
      align-self:center;        /* center vertically in left page */
      width: clamp(360px, 88%, 880px);
      border: 6px solid var(--pane-border);
      border-radius: calc(var(--pane-radius) + 2px);
      background: rgba(245,235,210,.28);
      box-shadow: 0 10px 28px rgba(0,0,0,.20);
      transform: translateX(var(--plate-nudge-x));  /* nudge left */
      transition: none !important; cursor: default;
    }
    /* keep the nudge on hover; no bounce */
    .hero-pane:hover{ transform: translateX(var(--plate-nudge-x)) !important; }
    /* inner stroke to feel like a mounted plate */
    .hero-pane::before{
      content:""; position:absolute; inset:8px;
      border:1.5px solid rgba(28,16,10,.38);
      border-radius: calc(var(--pane-radius) - 2px);
      opacity:.6; pointer-events:none;
    }
    .hero-pane img{ display:block; width:100%; height:auto; object-fit:contain; filter:saturate(.96) contrast(1.04); }

    /* Right page: title centered, text column to outer edge */
    .content{
      grid-column:2; grid-row:1 / span 2;
      align-self:start; justify-self:stretch;
      margin-top: clamp(26px, 3.6vh, 54px);
      padding-right: calc(var(--page-gutter) + 8px);
    }
    .content h1{
      margin:0 0 .55em 0;
      text-align:center;
      text-shadow: 0 1px 0 #f5e9cc, 0 2px 3px rgba(0,0,0,.12);
    }
    .content p{
      width: min(56ch, 92%);
      margin: 0 0 0 auto;       /* anchor to the outer edge */
      text-align:left; line-height:1.16;
      font-weight:700;
      -webkit-text-stroke: .16px rgba(245,233,204,.35);
      text-shadow: 0 1px 0 #f7ecd0, 0 1px 2px rgba(0,0,0,.10);
    }

    /* Small screens: single column */
    @media (max-width:900px){
      .inner{
        left:var(--page-gutter); right:var(--page-gutter);
        top:calc(var(--page-gutter) + 2px); bottom:calc(var(--page-gutter) + 2px);
        grid-template-columns:1fr;
        grid-template-rows:auto auto auto;
        gap:16px;
      }
      .home-btn{ grid-column:1; grid-row:1; }
      .content{ grid-column:1; grid-row:2; margin-top:16px; padding-right:0; }
      .content p{ width:100%; margin:0; }
      .hero-pane{
        grid-column:1; grid-row:3; width:100%;
        align-self:start; justify-self:stretch;
        transform:none; --plate-nudge-x: 0%;
      }
    }
  </style>
</head>
<body>
  <main id="stage" aria-label="Illuminated parchment page">
    <div class="margin left"  aria-hidden="true"><img src="assets/floral_border.png" alt=""></div>
    <div class="margin right" aria-hidden="true"><img src="assets/floral_border.png" alt=""></div>

    <div id="page">
      <div class="inner">
        <a href="index.html" class="home-btn" aria-label="Return home">⟵ Home</a>

        <div class="content">
          <h1><span aria-hidden="true">&#10016;</span> Crusades <span aria-hidden="true">&#10016;</span></h1>
          <p>Tour dates, campaigns, and dispatches to be inscribed here…</p>
        </div>

        <figure class="pane hero-pane">
          <img src="assets/crusader_battle.png" alt="Crusader battle illustration">
        </figure>
      </div>
    </div>
  </main>
</body>
</html>
