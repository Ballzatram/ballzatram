name: Update Parcel Data

on:
  schedule:
    - cron: "15 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r tools/parcel/requirements.txt

      - name: Run Parcel pipeline
        run: python tools/parcel/pipeline/update_properties.py

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/parcel/data/properties.csv tools/parcel/output/*.csv tools/parcel/output/*.json
          git diff --cached --quiet || git commit -m "chore(parcel): update shortlist outputs"
          git push
