<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ballzatram</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="sky" id="sky">
      <!-- Countdown banner -->
      <div class="countdown-wrapper">
        <div class="countdown-badge">
          <span class="countdown-label">NEXT DROP IN</span>
          <span id="countdown-timer" class="countdown-time">00:00:00</span>
        </div>
      </div>

      <!-- Ballzatram floating in the sky -->
      <div class="ballzatram">
        <img
          src="ballzatram.png"
          alt="Ballzatram floating in the sky, playing guitar"
        />
      </div>

      <!-- Clouds are created dynamically by script.js -->
    </div>

    <script src="script.js"></script>
  </body>
</html>
